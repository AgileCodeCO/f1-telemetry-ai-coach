name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Unit tests
        run: |
          dotnet test --no-build --configuration Release \
            --filter "Category!=Integration" \
            --collect:"XPlat Code Coverage" \
            /p:Threshold=70 /p:ThresholdType=line /p:ThresholdStat=average

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: "**/coverage.cobertura.xml"

  integration-tests:
    runs-on: ubuntu-latest
    services:
      influxdb:
        image: influxdb:2.7
        ports:
          - "8086:8086"
        env:
          DOCKER_INFLUXDB_INIT_MODE: setup
          DOCKER_INFLUXDB_INIT_USERNAME: f1admin
          DOCKER_INFLUXDB_INIT_PASSWORD: f1password
          DOCKER_INFLUXDB_INIT_ORG: f1telemetry
          DOCKER_INFLUXDB_INIT_BUCKET: telemetry
          DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ci-test-token
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Integration tests
        run: dotnet test --no-build --configuration Release --filter "Category=Integration"
        env:
          InfluxDb__Token: ci-test-token
